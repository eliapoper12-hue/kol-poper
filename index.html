<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | רדיו הילדים</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #ff9d00;
            --bg: #f0faff;
            --riddle-bg: #fff9c4;
            --quiz-bg: #e0f2f1;
            --live-red: #ff3d00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            overflow-x: hidden;
        }

        header {
            background-color: var(--secondary);
            width: 100%;
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* מצב מסיבה - רקע מחליף צבעים */
        @keyframes party-bg {
            0% { background-color: #ffadad; }
            25% { background-color: #ffd6a5; }
            50% { background-color: #caffbf; }
            75% { background-color: #9bf6ff; }
            100% { background-color: #ffc6ff; }
        }
        .party-active { animation: party-bg 1s infinite linear !important; }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 4px solid var(--primary);
            position: relative;
            z-index: 5;
        }

        /* באנר LIVE */
        .live-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--live-red);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* לוגו */
        .logo-container {
            width: 100%;
            max-width: 450px;
            height: auto;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            animation: logoEntrance 1.2s ease-out forwards;
            transition: transform 1s ease-in-out;
        }
        .logo-rotate { transform: rotate(360deg); }
        .logo-container img { width: 100%; height: auto; display: block; }

        .logo-container::after {
            content: "";
            position: absolute;
            top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            animation: shineEffect 4s infinite linear;
        }

        @keyframes logoEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(-20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes shineEffect { 0% { left: -60%; } 20% { left: 120%; } 100% { left: 120%; } }

        /* כפתורי ניגון */
        .btn-ctrl { 
            background: var(--primary); color: white; border: none; padding: 10px 25px; 
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #3a8fd6; position: relative; top: 0;
            margin: 5px;
        }
        .btn-ctrl:hover { transform: scale(1.1); background: var(--secondary); box-shadow: 0 6px 0 #e68a00; top: -2px; }
        .btn-ctrl:active { transform: scale(0.95); box-shadow: 0 2px 0 #e68a00; top: 2px; }

        .video-card { background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        video { width: 100%; display: block; }

        /* חידון */
        .quiz-box { background-color: var(--quiz-bg); border: 3px solid #009688; border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        .stars-display { font-size: 24px; color: #fbc02d; margin-bottom: 10px; min-height: 35px; }
        .quiz-option {
            background: white; border: 2px solid #009688; border-radius: 15px; padding: 10px; margin: 8px 0;
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .quiz-option:hover { background: #b2dfdb; transform: scale(1.02); }

        /* זוכים */
        .winners-box { background: #f3e5f5; border: 2px solid #9c27b0; border-radius: 20px; padding: 10px; margin-bottom: 20px; }
        .winners-list { font-weight: bold; font-size: 15px; color: #4a148c; line-height: 1.6; }

        /* חידה ו-WhatsApp */
        .riddle-box { background-color: var(--riddle-bg); border: 3px dashed #fbc02d; border-radius: 25px; padding: 15px; margin-bottom: 15px; }
        .whatsapp-box { background: #e6ffed; padding: 20px; border-radius: 25px; border: 2px dashed #25d366; margin-bottom: 15px; }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
        
        /* פעימת לב לוואטסאפ */
        .send-wa { 
            background: #25d366; color: white; border: none; padding: 12px 30px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px;
            animation: heartbeat 2s infinite;
        }
        @keyframes heartbeat { 0%, 20%, 100% { transform: scale(1); } 10% { transform: scale(1.05); } }

        /* כפתורי תחתית */
        .theme-toggle {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            color: white; border: none; padding: 12px 25px; border-radius: 50px;
            font-weight: bold; cursor: pointer; margin: 10px auto; display: block;
        }
        .party-toggle { background: linear-gradient(45deg, #f093fb, #f5576c); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* דברים יורדים */
        .falling-item { position: fixed; top: -50px; font-size: 28px; pointer-events: none; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .rainbow-theme { --primary: #ff00ff; --secondary: #7000ff; --bg: #fff0f5; --quiz-bg: #f3e5f5; }
        .rainbow-theme header { background: linear-gradient(to left, #ff00ff, #7000ff) !important; }

        footer { margin: 20px 0; padding: 10px; font-size: 14px; color: #666; text-align: center; }
    </style>
</head>
<body id="main-body">

    <header>
        <h1 style="margin:0;">רדיו קול פופר 🎈</h1>
    </header>

    <div class="container">
        <div class="live-badge">🔴 בשידור</div>
        
        <div id="main-logo" class="logo-container">
            <img src="logo.png" alt="לוגו קול פופר">
        </div>

        <h3 id="video-title">טוען וידאו...</h3>
        <div class="video-card">
            <video id="main-video" controls><source id="video-src" src="video1.mp4" type="video/mp4"></video>
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="changeVideo(-1)">⏮ הקודם</button>
            <button class="btn-ctrl" onclick="changeVideo(1)">הבא ⏭</button>
        </div>

        <hr style="margin: 20px 0; border: 1px solid #eee;">

        <div class="quiz-box">
            <div id="stars" class="stars-display"></div>
            <h2 style="color: #00796b; margin-top: 0; font-size: 20px;">🎧 חידון הטריוויה</h2>
            <p id="quiz-question" style="font-weight: bold; font-size: 17px;"></p>
            <div id="quiz-options"></div>
            <button onclick="loadNextQuestion()" style="background:none; border:none; color:#00796b; cursor:pointer; text-decoration:underline; margin-top:10px;">לשאלה הבאה ➔</button>
        </div>

        <div class="winners-box">
            <h4>🏆 הזוכים בהגרלה:</h4>
            <div class="winners-list">
                מקום ראשון: [שם הזוכה] 🥇<br>
                מקום שני: [שם הזוכה] 🥈<br>
                מקום שלישי: [שם הזוכה] 🥉
            </div>
        </div>

        <div class="riddle-box">
            <h2 style="color: #f57f17; margin:0;">🧩 החידה היומית</h2>
            <p style="font-size: 18px; font-weight: bold; margin: 10px 0;">איזה חג מתקרב אלינו?</p>
            <p style="font-size: 13px; color: #795548;">את התשובה שלחו למטה בצירוף שם מלא</p>
        </div>

        <div class="whatsapp-box">
            <h3>שלחו ד"ש ותשובה! 👋</h3>
            <input type="text" id="kidName" placeholder="השם שלי">
            <textarea id="msg" placeholder="התשובה או הדש שלי"></textarea>
            <button class="send-wa" onclick="sendToWhatsApp()">שלח הודעה לשדרן 📱</button>
        </div>

        <button class="theme-toggle" onclick="toggleTheme()">🎨 צבעי הקשת של קול פופר 🌈</button>
        <button class="party-toggle" onclick="toggleParty()">⚡ מצב מסיבה! ⚡</button>
    </div>

    <footer>© כל הזכויות שמורות לרדיו קול פופר</footer>

    <script>
        const videos = [
            { title: "ברוך שם - שמוליק קליין", file: "video1.mp4" },
            { title: "סנדי דינקל - אשרינו", file: "video2.mp4" },
            { title: "מי שאתה - סנדי דינקל", file: "video3.mp4" }
        ];

        const quizData = [
            { q: "איזה כלי נגינה הכי נפוץ ברדיו?", options: ["פסנתר 🎹", "גיטרה 🎸", "חצוצרה 🎺"], correct: 1 },
            { q: "מי שר את 'אשרינו'?", options: ["סנדי דינקל", "שמוליק קליין", "אברהם פריד"], correct: 0 },
            { q: "מה אוכלים בפסח?", options: ["מצה", "תפוח בדבש", "אוזן המן"], correct: 0 },
            { q: "קול פופר משעמם?", options: ["ברור שלא! הערוץ הכי מטורף בעולם", "כן", "ברור שכן"], correct: 0 }
        ];

        let currentIdx = 0;
        let qIndex = 0;
        let starCount = 0;
        let partyInterval;

        const videoPlayer = document.getElementById('main-video');
        const videoSource = document.getElementById('video-src');
        const videoTitle = document.getElementById('video-title');
        const logoContainer = document.getElementById('main-logo');

        function loadVideo() {
            videoTitle.innerText = videos[currentIdx].title;
            videoSource.src = videos[currentIdx].file;
            videoPlayer.load();
        }

        function changeVideo(dir) {
            currentIdx = (currentIdx + dir + videos.length) % videos.length;
            loadVideo();
            videoPlayer.play();
        }

        function displayQuiz() {
            const q = quizData[qIndex];
            document.getElementById('quiz-question').innerText = q.q;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'quiz-option';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === q.correct) {
                        alert("נכון מאוד! ⭐");
                        starCount++;
                        document.getElementById('stars').innerText = "⭐ ".repeat(starCount);
                        loadNextQuestion();
                    } else { alert("לא נכון, נסה שוב 🤔"); }
                };
                optionsDiv.appendChild(b);
            });
        }

        function loadNextQuestion() {
            qIndex = (qIndex + 1) % quizData.length;
            displayQuiz();
        }

        function sendToWhatsApp() {
            const name = document.getElementById('kidName').value;
            const msg = document.getElementById('msg').value;
            if(!name || !msg) return alert("מלאו שם והודעה!");
            window.open(`https://wa.me/972534314202?text=${encodeURIComponent("דש מ"+name+": "+msg)}`, '_blank');
        }

        // מצב מסיבה - גשם מוזיקלי רציף
        function toggleParty() { 
            const body = document.getElementById('main-body');
            body.classList.toggle('party-active'); 
            
            if(body.classList.contains('party-active')) {
                // גשם מוזיקלי: תווים, מיקרופונים, אוזניות
                partyInterval = setInterval(() => {
                    createFallingItem(['🎵', '🎶', '🎼', '🎤', '🎧', '🎸', '🎹', '🎷', '🎺']);
                }, 200);
            } else {
                clearInterval(partyInterval);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('rainbow-theme');
            if (document.body.classList.contains('rainbow-theme')) {
                playMagicSound();
                for(let i=0; i<30; i++) {
                    setTimeout(() => createFallingItem(['⭐']), i * 100);
                }
                logoContainer.classList.add('logo-rotate');
                setTimeout(() => logoContainer.classList.remove('logo-rotate'), 1000);
            }
        }

        function createFallingItem(icons) {
            const item = document.createElement('div');
            item.className = 'falling-item';
            item.innerText = icons[Math.floor(Math.random() * icons.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 2 + 2) + 's';
            item.style.opacity = Math.random() + 0.3;
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 4000);
        }

        function playMagicSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.5);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        loadVideo();
        displayQuiz();
    </script>
</body>
</html>
