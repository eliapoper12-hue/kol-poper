<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | רדיו הילדים</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #ff9d00;
            --bg: #f0faff;
            --quiz-bg: #e0f2f1;
            --live-red: #ff3d00;
            --joke-bg: #fff3e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            overflow-x: hidden;
        }

        header {
            background-color: var(--secondary);
            width: 100%;
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .live-status {
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            display: inline-block;
            font-size: 14px;
            color: #333;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 4px solid var(--primary);
            position: relative;
        }

        .logo-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--primary);
        }
        .logo-container img { width: 100%; height: auto; display: block; }

        .video-card { background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 15px; }
        video { width: 100%; display: block; }

        .btn-ctrl { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-joke { background: #ff5722; color: white; border: none; padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .section-box { border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; }
        .request-box { background-color: #f3e5f5; border-color: #9c27b0; }
        .joke-box { background-color: var(--joke-bg); border-color: #ff9800; }
        
        select { width: 95%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; font-family: inherit; font-size: 16px; }

        .whatsapp-box { background: #e6ffed; padding: 20px; border-radius: 25px; border: 2px dashed #25d366; margin-bottom: 15px; }
        input[type="text"], textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
        
        .send-wa { background: #25d366; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .falling-item { position: fixed; top: -50px; font-size: 28px; pointer-events: none; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        
        @keyframes party-bg {
            0% { background-color: #ffadad; }
            50% { background-color: #9bf6ff; }
            100% { background-color: #ffadad; }
        }
        .party-active { animation: party-bg 1s infinite linear !important; }

        footer { margin-bottom: 20px; font-size: 14px; color: #666; }
    </style>
</head>
<body id="main-body">

    <header>
        <h1 style="margin:0;">רדיו קול פופר 🎈</h1>
        <div class="live-status">🎧 <span id="listener-count">142</span> מאזינים איתנו עכשיו!</div>
    </header>

    <div class="container">
        <div id="main-logo" class="logo-container">
            <img src="logo.png" alt="לוגו קול פופר">
        </div>

        <h3 id="video-title">טוען...</h3>
        <div class="video-card">
            <video id="main-video" controls><source id="video-src" src="video1.mp4" type="video/mp4"></video>
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="changeVideo(-1)">⏮ הקודם</button>
            <button class="btn-ctrl" onclick="changeVideo(1)">הבא ⏭</button>
        </div>

        <hr style="margin: 20px 0; border: 1px solid #eee;">

        <div class="section-box request-box">
            <h3 style="margin-top:0; color:#7b1fa2;">🎵 איזה שיר לשים בשידור?</h3>
            <select id="song-request">
                <option>בחר שיר מהרשימה...</option>
                <option>שמוליק סוכות - הילד הזה</option>
                <option>ארי היל - איכא בשוקא</option>
                <option>שי וינר - יש לי מלך</option>
                <option>אבי אילסון ואהרלה סמט - המלמד תורה</option>
                <option>ברוך שם - שמוליק קליין</option>
                <option>אשרינו - סנדי דינקל</option>
            </select>
            <button class="btn-ctrl" style="background:#9c27b0;" onclick="sendRequest()">שלח בקשה 🎸</button>
        </div>

        <div class="section-box joke-box">
            <h3 style="margin-top:0; color:#e65100;">😂 פינת הבדיחה</h3>
            <p id="joke-text" style="font-weight:bold; min-height:40px;">לחצו על הכפתור כדי לצחוק!</p>
            <button class="btn-joke" onclick="getNewJoke()">תצחיק אותי! 🤣</button>
        </div>

        <div class="whatsapp-box">
            <h3>שלחו ד"ש ותשובה! 👋</h3>
            <input type="text" id="kidName" placeholder="השם שלי">
            <textarea id="msg" placeholder="התשובה או הדש שלי"></textarea>
            <button class="send-wa" onclick="sendToWhatsApp()">שלח הודעה לשדרן 📱</button>
        </div>

        <button class="btn-ctrl" style="background:linear-gradient(45deg, #f093fb, #f5576c); width:100%; padding:15px;" onclick="toggleParty()">⚡ מצב מסיבה! ⚡</button>
    </div>

    <footer>© כל הזכויות שמורות לרדיו קול פופר</footer>

    <script>
        const videos = [
            { title: "ברוך שם - שמוליק קליין", file: "video1.mp4" },
            { title: "סנדי דינקל - אשרינו", file: "video2.mp4" },
            { title: "מי שאתה - סנדי דינקל", file: "video3.mp4" }
        ];

        // מאגר בדיחות מורחב
        const jokes = [
            "למה פילים לא משתמשים במחשב? כי הם מפחדים מהעכבר!",
            "מה הדבר הכי מוזיקלי במטבח? הכף-תוף!",
            "למה המורה חבשה משקפי שמש? כי התלמידים שלה היו כל כך מבריקים!",
            "איך קוראים לדג שאין לו עין? דג (ד' ג' בלי י'!).",
            "מה עושה שוקולד כשהוא בלחץ? הוא נמס!",
            "למה התרנגולת חצתה את הכביש? כדי להראות לארנב שאפשר לעשות את זה!",
            "איך יודעים שמיץ ענבים הוא דתי? כי כתוב עליו 'תירוש'!",
            "מה אמר העציץ לחבר שלו? 'מה קורה, אחי? צומח?'",
            "למה הספרייה היא המקום הכי גבוה בעולם? כי יש בה המון סיפורים (קומות)!",
            "איך קוראים לילד שמתופף על כל דבר? 'דופק בדלת'!",
            "מה עושה ענן כשיש לו גירוד? הוא מחפש גורד שחקים!",
            "למה השמיכה לא מרגישה טוב? כי יש לה חום!",
            "מה אמר האפס לתשע? 'וואו, איזה כובע יפה!'",
            "איך קוראים לאיש שתמיד שומר על השקט? ששש-מעון!",
            "למה הירח תמיד כל כך עייף? כי הוא ער כל הלילה!",
            "מה ההבדל בין פיל לפסנתר? על פסנתר אפשר לנגן, אבל פיל אי אפשר לנגן!"
        ];

        let currentIdx = 0, partyInterval;

        setInterval(() => {
            const count = 120 + Math.floor(Math.random() * 50);
            document.getElementById('listener-count').innerText = count;
        }, 5000);

        function changeVideo(dir) {
            currentIdx = (currentIdx + dir + videos.length) % videos.length;
            document.getElementById('video-title').innerText = videos[currentIdx].title;
            document.getElementById('video-src').src = videos[currentIdx].file;
            document.getElementById('main-video').load();
            document.getElementById('main-video').play();
        }

        function getNewJoke() {
            const randomJoke = jokes[Math.floor(Math.random() * jokes.length)];
            document.getElementById('joke-text').innerText = randomJoke;
        }

        function sendRequest() {
            const song = document.getElementById('song-request').value;
            if(song.includes("בחר")) return alert("בחר שיר קודם!");
            alert("הבקשה לשיר '" + song + "' נשלחה לשדרן! 🎧");
        }

        function sendToWhatsApp() {
            const name = document.getElementById('kidName').value;
            const msg = document.getElementById('msg').value;
            if(!name || !msg) return alert("מלאו שם והודעה!");
            
            // פורמט הודעה מעודכן לבקשתך
            const finalMsg = `שלום לקול פופר! השם שלי (${name}) התשובה \\ הדש שלי (${msg})`;
            
            window.open(`https://wa.me/972534314202?text=${encodeURIComponent(finalMsg)}`, '_blank');
        }

        function toggleParty() { 
            const b = document.body;
            b.classList.toggle('party-active'); 
            if(b.classList.contains('party-active')) {
                partyInterval = setInterval(() => {
                    const item = document.createElement('div');
                    item.className = 'falling-item';
                    item.innerText = ['🎵', '🎶', '🎤', '🎸', '🎹'][Math.floor(Math.random()*5)];
                    item.style.left = Math.random() * 100 + 'vw';
                    item.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(item);
                    setTimeout(() => item.remove(), 4000);
                }, 200);
            } else clearInterval(partyInterval);
        }

        changeVideo(0);
    </script>
</body>
</html>
