<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | רדיו הילדים</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #ff9d00;
            --bg: #f0faff;
            --riddle-bg: #fff9c4;
            --quiz-bg: #e0f2f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        header {
            background-color: var(--secondary);
            width: 100%;
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        @keyframes party-bg {
            0% { background-color: #ffadad; }
            25% { background-color: #ffd6a5; }
            50% { background-color: #caffbf; }
            75% { background-color: #9bf6ff; }
            100% { background-color: #ffc6ff; }
        }
        .party-active { animation: party-bg 1s infinite linear !important; }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 4px solid var(--primary);
            position: relative;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes dance {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .party-active .logo-container img { animation: dance 0.5s infinite; }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 25px;
            background: #000;
            margin-bottom: 15px;
            border: 3px solid #eee;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .riddle-box { background-color: var(--riddle-bg); border: 3px dashed #fbc02d; border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        .quiz-box { background-color: var(--quiz-bg); border: 3px solid #009688; border-radius: 25px; padding: 15px; margin-bottom: 20px; }
        .stars-display { font-size: 24px; color: #fbc02d; margin-bottom: 10px; min-height: 35px; }
        
        .quiz-option {
            background: white; border: 2px solid #009688; border-radius: 15px; padding: 10px; margin: 8px 0;
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .quiz-option:hover { background: #b2dfdb; transform: scale(1.02); }
        
        .whatsapp-box { background: #e6ffed; padding: 20px; border-radius: 25px; border: 2px dashed #25d366; margin-top: 15px; }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
        .send-wa { background: #25d366; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .controls { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .btn-ctrl { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .party-toggle { background: linear-gradient(45deg, #f093fb, #f5576c); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        footer {
            margin: 20px 0;
            padding: 10px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body id="main-body">

    <header>
        <h1 style="margin:0; font-size:24px;">רדיו קול פופר 🎈</h1>
    </header>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="לוגו קול פופר">
        </div>

        <h3 id="video-title">טוען סרטון...</h3>
        <div class="video-container">
            <iframe id="youtube-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="changeVideo(-1)">⏮ הקודם</button>
            <button class="btn-ctrl" onclick="changeVideo(1)">הבא ⏭</button>
        </div>

        <div class="riddle-box">
            <h2 style="color: #f57f17; margin:0;">🧩 החידה היומית</h2>
            <p style="font-size: 18px; font-weight: bold; margin: 10px 0;">איזה חג מתקרב אלינו?</p>
            <p style="font-size: 13px; color: #795548;">את התשובות לכתוב בד"ש לשידור בצירוף שם פרטי ושם משפחה</p>
        </div>

        <div class="quiz-box">
            <div id="stars" class="stars-display"></div>
            <h2 style="color: #00796b; margin-top: 0; font-size: 20px;">🎧 חידון הטריוויה</h2>
            <p id="quiz-question" style="font-weight: bold; font-size: 17px;"></p>
            <div id="quiz-options"></div>
            <button onclick="loadNextQuestion()" style="background:none; border:none; color:#00796b; cursor:pointer; text-decoration:underline; margin-top:10px;">לשאלה הבאה ➔</button>
        </div>

        <div class="whatsapp-box">
            <h3>שלחו ד"ש ותשובה! 👋</h3>
            <input type="text" id="kidName" placeholder="שם פרטי ושם משפחה">
            <textarea id="msg" placeholder="כתבו כאן את התשובה לחידה או ד"ש..."></textarea>
            <button class="send-wa" onclick="sendToWhatsApp()">שלח הודעה לשדרן 📱</button>
        </div>

        <button class="party-toggle" onclick="toggleParty()">⚡ מצב מסיבה! ⚡</button>
    </div>

    <footer>
        © כל הזכויות שמורות לרדיו קול פופר
    </footer>

    <script>
        // שימוש בגרסאות סרטונים שמאפשרות הטמעה (Embedding)
        const playlist = [
            { title: "ברוך שם - שמוליק קליין", id: "0v9Nn-D9XgE" },
            { title: "סנדי דינקל - אשרינו", id: "5R8V0-nOf-c" },
            { title: "מי שאתה - סנדי דינקל", id: "mAnB1A7E_m0" }
        ];

        let currentVideoIndex = 0;

        function updatePlayer() {
            const video = playlist[currentVideoIndex];
            document.getElementById('video-title').innerText = video.title;
            // שימוש בפורמט embed תקין
            document.getElementById('youtube-player').src = "https://www.youtube.com/embed/" + video.id + "?rel=0";
        }

        function changeVideo(direction) {
            currentVideoIndex = (currentVideoIndex + direction + playlist.length) % playlist.length;
            updatePlayer();
        }

        const quizData = [
            { q: "איזה כלי נגינה הכי נפוץ ברדיו?", options: ["פסנתר 🎹", "גיטרה 🎸", "חצוצרה 🎺"], correct: 1 },
            { q: "מי שר את 'אשרינו'?", options: ["סנדי דינקל", "שמוליק קליין", "אברהם פריד"], correct: 0 },
            { q: "מה אוכלים בפסח?", options: ["מצה", "תפוח בדבש", "אוזן המן"], correct: 0 },
            { q: "קול פופר משעמם?", options: ["ברור שלא! הערוץ הכי מטורף בעולם", "כן", "ברור שכן"], correct: 0 },
        ];

        let qIndex = 0;
        let starCount = 0;

        function displayQuiz() {
            const q = quizData[qIndex];
            document.getElementById('quiz-question').innerText = q.q;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = "";

            q.options.forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'quiz-option';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === q.correct) {
                        alert("נכון מאוד! קיבלת כוכב! ⭐");
                        addStar();
                        loadNextQuestion();
                    } else {
                        alert("לא נכון, נסה שוב 🤔");
                    }
                };
                optionsDiv.appendChild(b);
            });
        }

        function addStar() {
            starCount++;
            document.getElementById('stars').innerText = "⭐ ".repeat(starCount);
        }

        function loadNextQuestion() {
            qIndex = (qIndex + 1) % quizData.length;
            displayQuiz();
        }

        function sendToWhatsApp() {
            const name = document.getElementById('kidName').value;
            const msg = document.getElementById('msg').value;
            if(!name || !msg) return alert("מלאו שם והודעה!");
            window.open("https://wa.me/972534314202?text=" + encodeURIComponent('היי קול פופר! אני ' + name + ': ' + msg), '_blank');
        }

        function toggleParty() { 
            document.getElementById('main-body').classList.toggle('party-active'); 
        }

        updatePlayer();
        displayQuiz();
    </script>
</body>
</html>
