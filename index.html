<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | האתר הרשמי</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --popper-blue: #4facfe; --popper-light: #00f2fe; --secondary: #ff9d00;
            --bg: #f0faff; --nav-bg: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); margin: 0; padding-bottom: 50px;
            transition: background-color 0.5s ease; overflow-x: hidden;
        }

        /* סדר אלמנטים בראש */
        header { background-color: var(--secondary); width: 100%; padding: 20px; text-align: center; color: white; border-bottom: 5px solid #e68a00; cursor: pointer; user-select: none; }
        nav { background-color: var(--nav-bg); width: 100%; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; }
        nav a { color: white; padding: 15px 20px; text-decoration: none; font-weight: bold; cursor: pointer; }
        nav a:hover, nav a.active { background-color: var(--popper-blue); }

        /* לוח מודעות צהוב */
        #news-container { width: 90%; max-width: 600px; margin: 10px auto; }
        .news-item { background: #fff9c4; border: 2px solid #fbc02d; padding: 10px; border-radius: 15px; margin-bottom: 8px; font-weight: bold; color: #f57f17; border-right: 8px solid #fbc02d; text-align: right; }

        /* עיצוב קונטיינרים מקורי */
        .container { width: 90%; max-width: 600px; background: white; margin: 20px auto; padding: 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 4px solid var(--popper-blue); display: none; }
        .container.active { display: block; }
        .section-box { border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; }

        .btn-ctrl { background: var(--popper-blue); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 5px; }
        .form-input { width: 85%; padding: 12px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 15px; font-family: inherit; }

        /* מסיבה */
        body.party-active { animation: rainbow-party 3s infinite linear !important; }
        @keyframes rainbow-party { 0% { background-color: #ffadad; } 50% { background-color: #9bf6ff; } 100% { background-color: #ffadad; } }

        /* אדמין */
        #admin-panel { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 90%; background: #fff; border: 6px solid var(--secondary); z-index: 10002; padding: 20px; border-radius: 30px; box-shadow: 0 0 100px rgba(0,0,0,0.5); overflow-y: auto; text-align: right; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        .admin-table td { border: 1px solid #eee; padding: 8px; font-size: 13px; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header onclick="handleAdminClick()">
        <h1 style="margin:0;">רדיו קול פופר 🎈</h1>
        <div style="font-size:14px; font-weight:bold;">שידור חי מפתח תקווה</div>
    </header>

    <nav>
        <a onclick="showPage('home')" id="nav-home" class="active">🏠 דף הבית</a>
        <a onclick="showPage('riddles')" id="nav-riddles">🧩 חידות</a>
        <a onclick="showPage('jokes')" id="nav-jokes">😂 בדיחות</a>
        <a onclick="showPage('contact')" id="nav-contact">📱 צור קשר</a>
    </nav>

    <div id="news-container"></div>

    <div id="admin-panel">
        <h2 style="text-align:center;">⚙️ ניהול קול פופר</h2>
        
        <div style="background:#fff0f0; padding:15px; border-radius:20px; margin-bottom:20px;">
            <button class="btn-ctrl" style="background:red;" onclick="db.ref('likes').set(0)">איפוס לייקים 0</button>
            <button class="btn-ctrl" style="background:red;" onclick="db.ref('comments').remove()">מחיקת כל התגובות 🗑️</button>
        </div>

        <div style="background:#f0f7ff; padding:15px; border-radius:20px;">
            <h3>🏆 ניהול טבלת מובילים:</h3>
            <div id="adm-winners-list"></div>
            <h3>🎵 ניהול שירים (MP3):</h3>
            <div id="adm-mp3-list"></div>
            <h3>❓ ניהול שאלות:</h3>
            <div id="adm-q-list"></div>
        </div>

        <button class="btn-ctrl" style="width:100%; background:#333; margin-top:20px;" onclick="document.getElementById('admin-panel').style.display='none'">סגור X</button>
    </div>

    <div id="home" class="container active">
        <img src="logo.png" style="width:200px; margin-bottom:20px;" alt="לוגו">
        
        <div class="section-box" style="background:#000; padding:0; overflow:hidden;">
            <video id="main-video" style="width:100%;" controls></video>
        </div>
        <button class="btn-ctrl" onclick="changeVideo(-1)">⏮ הקודם</button>
        <button class="btn-ctrl" onclick="changeVideo(1)">הבא ⏭</button>

        <div class="section-box" style="background:#333; color:white; text-align:right;">
            <div id="mp3-title" style="font-weight:bold; color:var(--popper-light);">טוען שיר...</div>
            <audio id="main-audio" style="width:100%; margin-top:10px;" controls></audio>
            <div id="playlist-home" style="font-size:12px; margin-top:10px; max-height:100px; overflow-y:auto;"></div>
        </div>

        <button class="btn-ctrl" style="font-size:40px;" onclick="addLike()">❤️</button>
        <p><span id="likes-number">0</span> לייקים לרדיו</p>

        <div class="section-box" style="text-align:right; background:#f1f8ff;">
            <div id="comments-list" style="max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
            <input type="text" id="comm-name" placeholder="שם" style="width:30%; padding:5px; border-radius:10px; border:1px solid #ccc;">
            <input type="text" id="comm-text" placeholder="תגובה..." style="width:50%; padding:5px; border-radius:10px; border:1px solid #ccc;">
            <button onclick="postComment()" class="btn-ctrl" style="padding:5px 15px;">שלח</button>
        </div>

        <div class="section-box" style="background:#f3e5f5; border-color:#9c27b0;">
            <h3>🏆 טבלת האלופים:</h3>
            <div id="leaderboard"></div>
        </div>

        <button class="btn-ctrl" style="background: linear-gradient(45deg, #ff0080, #ff8c00); width:100%;" onclick="document.body.classList.toggle('party-active')">🎊 מסיבה! 🎊</button>
    </div>

    <div id="riddles" class="container">
        <h2>🧩 חידות וחידון</h2>
        <div class="section-box">
            <p id="quiz-question" style="font-weight:bold; font-size:18px;">טוען...</p>
            <div id="quiz-options"></div>
        </div>
    </div>

    <div id="jokes" class="container">
        <h2>😂 פינת הצחוק</h2>
        <div id="joke-display" class="section-box" style="font-size:20px; font-weight:bold;"></div>
        <button class="btn-ctrl" onclick="changeJoke(1)">בדיחה אחרת 🤣</button>
    </div>

    <div id="contact" class="container">
        <h2>📱 צור קשר עם האולפן</h2>
        <div class="section-box" style="background:#e8f5e9; text-align:right;">
            <p>שלח לנו הודעה או בקשת שיר:</p>
            <input type="text" id="contact-name" class="form-input" placeholder="השם שלך">
            <textarea id="contact-msg" class="form-input" placeholder="ההודעה שלך..." style="height:80px;"></textarea>
            <button class="btn-ctrl" style="background:#25d366; width:100%;" onclick="sendContactWA()">שלח לוואטסאפ האולפן 💬</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8Dqhb0_CypZDgC0Pks3Sumag5LYnCddA",
            databaseURL: "https://kolpopper-46-default-rtdb.firebaseio.com",
            projectId: "kolpopper-46",
            appId: "1:205439458089:web:54efeaaa1aae748fc7b538"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let data = { jokes_list:[], video_list:[], mp3_list:[], quiz_questions:[], winners:[], news_list:[] };
        let cur = { video:0, joke:0, mp3:0 };

        function sync(path) {
            db.ref(path).on('value', s => {
                const v = s.val();
                data[path] = v ? Object.values(v) : [];
                data[path + '_keys'] = v ? Object.keys(v) : [];
                render();
            });
        }
        ['jokes_list','video_list','mp3_list','quiz_questions','winners','news_list','likes'].forEach(sync);

        db.ref('comments').on('value', s => {
            const list = document.getElementById('comments-list'); list.innerHTML = "";
            if(s.val()) Object.values(s.val()).forEach(c => list.innerHTML += `<div><b>${c.name}:</b> ${c.text}</div>`);
        });

        function render() {
            document.getElementById('likes-number').innerText = data.likes || 0;
            document.getElementById('news-container').innerHTML = data.news_list.map(n => `<div class="news-item">📢 ${n.text}</div>`).join('');
            
            if(data.video_list.length > 0) {
                const v = data.video_list[cur.video % data.video_list.length];
                if(document.getElementById('main-video').src !== v.url) document.getElementById('main-video').src = v.url;
            }

            if(data.mp3_list.length > 0) {
                const m = data.mp3_list[cur.mp3 % data.mp3_list.length];
                document.getElementById('mp3-title').innerText = "מתנגן: " + m.name;
                if(document.getElementById('main-audio').src !== m.url) document.getElementById('main-audio').src = m.url;
                document.getElementById('playlist-home').innerHTML = data.mp3_list.map((t,i) => `<div onclick="playSong(${i})" style="cursor:pointer">🎵 ${t.name}</div>`).join('');
            }

            if(data.jokes_list.length > 0) document.getElementById('joke-display').innerText = data.jokes_list[cur.joke % data.jokes_list.length].text;

            document.getElementById('leaderboard').innerHTML = data.winners.map(w => `<div>⭐ ${w.name} - ${w.score}</div>`).join('');

            // אדמין
            renderAdminTable('winners', 'adm-winners-list', i => i.name);
            renderAdminTable('mp3_list', 'adm-mp3-list', i => i.name);
            renderAdminTable('quiz_questions', 'adm-q-list', i => i.q);
        }

        function renderAdminTable(path, target, format) {
            const list = data[path], keys = data[path+'_keys'];
            let h = '<table class="admin-table">';
            list.forEach((item, i) => { h += `<tr><td>${format(item)}</td><td><button class="btn-del" onclick="db.ref('${path}/${keys[i]}').remove()">X</button></td></tr>`; });
            document.getElementById(target).innerHTML = h + '</table>';
        }

        function addLike() { db.ref('likes').transaction(c => (c || 0) + 1); }
        function postComment() { const n=document.getElementById('comm-name').value, t=document.getElementById('comm-text').value; if(n&&t) db.ref('comments').push({name:n,text:t}); }
        function playSong(i) { cur.mp3=i; render(); document.getElementById('main-audio').play(); }
        function changeVideo(d) { cur.video=(cur.video+d+data.video_list.length)%data.video_list.length; render(); }
        function changeJoke(d) { cur.joke=(cur.joke+d+data.jokes_list.length)%data.jokes_list.length; render(); }
        function showPage(p) { document.querySelectorAll('.container').forEach(c=>c.classList.remove('active')); document.getElementById(p).classList.add('active'); }
        
        function sendContactWA() {
            const name = document.getElementById('contact-name').value;
            const msg = document.getElementById('contact-msg').value;
            window.open(`https://wa.me/972534314202?text=${encodeURIComponent('הודעה מ: ' + name + '\n' + msg)}`);
        }

        let cc = 0;
        function handleAdminClick() { cc++; if(cc>=3) document.getElementById('admin-panel').style.display='block'; setTimeout(()=>cc=0,2000); }
    </script>
</body>
</html>
