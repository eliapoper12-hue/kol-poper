<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | האתר הרשמי</title>
    <style>
        :root {
            --popper-blue: #4facfe;
            --popper-light: #00f2fe;
            --secondary: #ff9d00;
            --bg: #f0faff;
            --nav-bg: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        /* מצב קול פופר - צבעים */
        body.popper-mode-active {
            background-color: #003366; 
        }
        body.popper-mode-active .container {
            border-color: var(--popper-light);
            background-color: #e0f7ff;
            box-shadow: 0 0 25px var(--popper-blue);
        }

        nav { background-color: var(--nav-bg); width: 100%; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; }
        nav a { color: white; padding: 15px 20px; text-decoration: none; font-weight: bold; cursor: pointer; }
        nav a:hover, nav a.active { background-color: var(--popper-blue); }

        header { background-color: var(--secondary); width: 100%; padding: 20px; text-align: center; color: white; border-bottom: 5px solid #e68a00; }

        /* הגדלת הלוגו בדף הבית */
        .main-logo {
            width: 80%; /* הלוגו גדול יותר עכשיו */
            max-width: 400px;
            margin: 0 auto 20px;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: white;
            margin: 20px auto;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid var(--popper-blue);
            display: none;
            position: relative;
        }
        .container.active { display: block; }

        .section-box { border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; }
        
        .btn-popper { 
            background: linear-gradient(45deg, var(--popper-blue), var(--popper-light)); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 35px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 20px;
            width: 100%;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            border: 2px solid white;
            transition: 0.3s;
        }

        /* אפקט כוכבים יורדים */
        .falling-star {
            position: fixed;
            top: -50px;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .btn-ctrl { background: var(--popper-blue); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 5px; }
        .quiz-option { background: white; border: 2px solid #009688; border-radius: 15px; padding: 12px; margin: 10px 0; cursor: pointer; font-weight: bold; }
        .winner-tag { background: #f3e5f5; border-radius: 15px; padding: 8px; margin: 5px auto; width: 85%; border: 2px dashed #9c27b0; font-size: 17px; font-weight: bold; color: #4a148c; }
        .send-wa { background: #25d366; color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; margin-top: 10px; }

        footer { text-align: center; color: #888; font-size: 14px; margin: 20px 0; }
    </style>
</head>
<body>

    <nav>
        <a onclick="showPage('home')" id="nav-home" class="active">🏠 דף הבית</a>
        <a onclick="showPage('riddles')" id="nav-riddles">🧩 חידות</a>
        <a onclick="showPage('jokes')" id="nav-jokes">😂 בדיחות</a>
        <a onclick="showPage('contact')" id="nav-contact">📱 צור קשר</a>
    </nav>

    <header>
        <h1 style="margin:0;">רדיו קול פופר 🎈</h1>
    </header>

    <div id="home" class="container active">
        <img src="logo.png" class="main-logo" alt="לוגו קול פופר">
        
        <div class="section-box" style="background:#000; color:white; overflow:hidden;">
            <video id="main-video" style="width:100%;" controls><source id="video-src" src="video1.mp4" type="video/mp4"></video>
        </div>
        
        <button class="btn-ctrl" onclick="changeVideo(-1)">⏮ הקודם</button>
        <button class="btn-ctrl" onclick="changeVideo(1)">הבא ⏭</button>

        <div class="section-box" style="background:#f3e5f5; border-color:#9c27b0; margin-top: 15px;">
            <h3 style="color:#7b1fa2; margin-top:0;">🏆 טבלת הזוכים:</h3>
            <div class="winner-tag">🥇 ישראל ישראלי</div>
            <div class="winner-tag">🥈 לוי לוי</div>
            <div class="winner-tag">🥉 משה כהן</div>
        </div>
        
        <button class="btn-popper" onclick="togglePopperMode()">⚡ מצב קול פופר! ⚡</button>
    </div>

    <div id="riddles" class="container">
        <h2 style="color: #00796b;">🧩 חידון יהדות</h2>
        <div class="section-box" style="background: #e0f2f1; border-color: #009688;">
            <div id="stars-display" style="font-size:24px; margin-bottom: 10px;"></div>
            <p id="quiz-question" style="font-weight:bold; font-size:20px;"></p>
            <div id="quiz-options"></div>
        </div>
        
        <div class="section-box" style="background:#fffde7; border: 3px dashed #fbc02d;">
            <h3>📨 שלח תשובה לחידה</h3>
            <input type="text" id="riddleKidName" placeholder="השם שלי">
            <textarea id="riddleAnswer" placeholder="התשובה שלי..."></textarea>
            <button class="send-wa" onclick="sendRiddleAnswer()">שלח תשובה לוואטסאפ 🧩</button>
        </div>
    </div>

    <div id="jokes" class="container">
        <h2 style="color: #e65100;">😂 פינת הצחוק</h2>
        <div class="section-box" style="background: #fff3e0; border-color: #ff9800; min-height: 120px; display:flex; align-items:center; justify-content:center;">
            <p id="joke-text" style="font-size:20px; font-weight:bold; color: #bf360c;"></p>
        </div>
        <button class="btn-ctrl" style="background:#ff9800; width:100%; padding:15px;" onclick="getNewJoke()">בדיחה חדשה 🤣</button>
    </div>

    <div id="contact" class="container">
        <h2 style="color: #2e7d32;">📱 צור קשר</h2>
        <div class="section-box" style="background:#e8f5e9;">
            <h3>🎵 בקשת שיר</h3>
            <select id="song-choice">
                <option>בחרו שיר...</option>
                <option>שמוליק סוכות - הילד הזה</option>
                <option>ברוך שם - שמוליק קליין</option>
            </select>
            <button class="send-wa" style="background:#4caf50;" onclick="sendSongRequest()">שלח בקשה 🎵</button>
        </div>
    </div>

    <footer>© כל הזכויות שמורות לרדיו קול פופר</footer>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        // פונקציית כוכבים ומצב קול פופר
        let starInterval;
        function togglePopperMode() {
            const isActive = document.body.classList.toggle('popper-mode-active');
            
            if(isActive) {
                starInterval = setInterval(() => {
                    const star = document.createElement('div');
                    star.className = 'falling-star';
                    star.innerText = '⭐';
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(star);
                    setTimeout(() => star.remove(), 4000);
                }, 300);
            } else {
                clearInterval(starInterval);
            }
        }

        const videos = ["video1.mp4", "video2.mp4", "video3.mp4"];
        let vIdx = 0;
        function changeVideo(d) {
            vIdx = (vIdx + d + videos.length) % videos.length;
            document.getElementById('video-src').src = videos[vIdx];
            document.getElementById('main-video').load();
            document.getElementById('main-video').play();
        }

        // חידות
        const quizData = [
            { q: "איזו מסכת היא הראשונה בש\"ס?", options: ["ברכות", "שבת"], correct: 0 },
            { q: "כמה תפילות מתפללים בשבת?", options: ["3", "4"], correct: 1 },
            { q: "מה מברכים אחרי נטילת ידיים?", options: ["על נטילת ידיים", "המוציא"], correct: 0 },
            { q: "איזה חומש בא אחרי ספר שמות?", options: ["ויקרא", "במדבר"], correct: 0 }
        ];
        let qIndex = 0, starCount = 0;

        function displayQuiz() {
            const q = quizData[qIndex];
            document.getElementById('quiz-question').innerText = q.q;
            const optDiv = document.getElementById('quiz-options');
            optDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'quiz-option';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === q.correct) {
                        starCount++;
                        document.getElementById('stars-display').innerText = "⭐ ".repeat(starCount);
                        qIndex = (qIndex + 1) % quizData.length;
                        displayQuiz();
                    } else alert("נסה שוב! 🤔");
                };
                optDiv.appendChild(b);
            });
        }

        function getNewJoke() {
            const jokes = ["למה פילים מפחדים מעכבר? כי הוא במחשב!", "מה אמר השולחן לכיסא? שב עלי!", "מה מברך דג דתי? ברוך שעשני כרפיון!"];
            document.getElementById('joke-text').innerText = jokes[Math.floor(Math.random()*jokes.length)];
        }

        function sendRiddleAnswer() {
            const n = document.getElementById('riddleKidName').value;
            const a = document.getElementById('riddleAnswer').value;
            window.open(`https://wa.me/972534314202?text=${encodeURIComponent('חידה מהאתר: ' + n + ' ענה: ' + a)}`);
        }

        function sendSongRequest() {
            const s = document.getElementById('song-choice').value;
            window.open(`https://wa.me/972534314202?text=${encodeURIComponent('בקשת שיר: ' + s)}`);
        }

        displayQuiz();
        getNewJoke();
    </script>
</body>
</html>
