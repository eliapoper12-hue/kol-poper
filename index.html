<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | רדיו הילדים</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #ff9d00;
            --bg: #f0faff;
            --riddle-bg: #fff9c4;
            --quiz-bg: #e0f2f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        header {
            background-color: var(--secondary);
            width: 100%;
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        @keyframes party-bg {
            0% { background-color: #ffadad; }
            25% { background-color: #ffd6a5; }
            50% { background-color: #caffbf; }
            75% { background-color: #9bf6ff; }
            100% { background-color: #ffc6ff; }
        }
        .party-active { animation: party-bg 1s infinite linear !important; }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 4px solid var(--primary);
            position: relative;
        }

/* עיצוב הלוגו המוגדל עם האנימציות */
        .logo-container {
            width: 100%;
            max-width: 450px;
            height: auto;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative; /* נחוץ עבור אפקט הנצנוץ */
            animation: logoEntrance 1.2s ease-out forwards;
        }

        .logo-container img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* אפקט הנצנוץ (Shine) */
        .logo-container::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            animation: shineEffect 4s infinite linear;
        }

        /* אנימציית כניסה */
        @keyframes logoEntrance {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* אנימציית נצנוץ */
        @keyframes shineEffect {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        /* ריקוד הלוגו במצב מסיבה */
        @keyframes dance {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .party-active .logo-container img { animation: dance 0.6s infinite ease-in-out; }

        .video-card {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        video { width: 100%; display: block; }

        .quiz-box { 
            background-color: var(--quiz-bg); 
            border: 3px solid #009688; 
            border-radius: 25px; 
            padding: 15px; 
            margin-bottom: 20px; 
        }
        .stars-display { font-size: 24px; color: #fbc02d; margin-bottom: 10px; min-height: 35px; }
        
        .quiz-option {
            background: white; border: 2px solid #009688; border-radius: 15px; padding: 10px; margin: 8px 0;
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .quiz-option:hover { background: #b2dfdb; transform: scale(1.02); }

        .riddle-box { 
            background-color: var(--riddle-bg); 
            border: 3px dashed #fbc02d; 
            border-radius: 25px; 
            padding: 15px; 
            margin-bottom: 10px;
        }

        .whatsapp-box { 
            background: #e6ffed; 
            padding: 20px; 
            border-radius: 25px; 
            border: 2px dashed #25d366; 
        }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; }
        .send-wa { background: #25d366; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .controls { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .btn-ctrl { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .party-toggle { background: linear-gradient(45deg, #f093fb, #f5576c); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        footer { margin: 20px 0; padding: 10px; font-size: 14px; color: #666; text-align: center; }
    </style>
</head>
<body id="main-body">

    <header>
        <h1 style="margin:0; font-size:24px;">רדיו קול פופר 🎈</h1>
    </header>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="לוגו קול פופר">
        </div>

        <h3 id="video-title">טוען וידאו...</h3>
        
        <div class="video-card">
            <video id="main-video" controls>
                <source id="video-src" src="video1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="changeVideo(-1)">⏮ הקודם</button>
            <button class="btn-ctrl" onclick="changeVideo(1)">הבא ⏭</button>
        </div>

        <hr style="margin: 20px 0; border: 1px solid #eee;">

        <div class="quiz-box">
            <div id="stars" class="stars-display"></div>
            <h2 style="color: #00796b; margin-top: 0; font-size: 20px;">🎧 חידון הטריוויה</h2>
            <p id="quiz-question" style="font-weight: bold; font-size: 17px;"></p>
            <div id="quiz-options"></div>
            <button onclick="loadNextQuestion()" style="background:none; border:none; color:#00796b; cursor:pointer; text-decoration:underline; margin-top:10px;">לשאלה הבאה ➔</button>
        </div>

        <div class="riddle-box">
            <h2 style="color: #f57f17; margin:0;">🧩 החידה היומית</h2>
            <p style="font-size: 18px; font-weight: bold; margin: 10px 0;">איזה חג מתקרב אלינו?</p>
            <p style="font-size: 13px; color: #795548;">את התשובה שלחו למטה בצירוף שם מלא</p>
        </div>

        <div class="whatsapp-box">
            <h3>שלחו ד"ש ותשובה! 👋</h3>
            <input type="text" id="kidName" placeholder="השם שלי">
            <textarea id="msg" placeholder="התשובה או הדש שלי"></textarea>
            <button class="send-wa" onclick="sendToWhatsApp()">שלח הודעה לשדרן 📱</button>
        </div>

        <button class="party-toggle" onclick="toggleParty()">⚡ מצב מסיבה! ⚡</button>
    </div>

    <footer>
        © כל הזכויות שמורות לרדיו קול פופר
    </footer>

    <script>
        const videos = [
            { title: "ברוך שם - שמוליק קליין", file: "video1.mp4" },
            { title: "סנדי דינקל - אשרינו", file: "video2.mp4" },
            { title: "מי שאתה - סנדי דינקל", file: "video3.mp4" }
        ];

        let currentIdx = 0;
        const videoPlayer = document.getElementById('main-video');
        const videoSource = document.getElementById('video-src');
        const videoTitle = document.getElementById('video-title');

        function loadVideo() {
            videoTitle.innerText = videos[currentIdx].title;
            videoSource.src = videos[currentIdx].file;
            videoPlayer.load();
        }

        function changeVideo(dir) {
            currentIdx = (currentIdx + dir + videos.length) % videos.length;
            loadVideo();
            videoPlayer.play();
        }

        const quizData = [
            { q: "איזה כלי נגינה הכי נפוץ ברדיו?", options: ["פסנתר 🎹", "גיטרה 🎸", "חצוצרה 🎺"], correct: 1 },
            { q: "מי שר את 'אשרינו'?", options: ["סנדי דינקל", "שמוליק קליין", "אברהם פריד"], correct: 0 },
            { q: "מה אוכלים בפסח?", options: ["מצה", "תפוח בדבש", "אוזן המן"], correct: 0 },
            { q: "קול פופר משעמם?", options: ["ברור שלא! הערוץ הכי מטורף בעולם", "כן", "ברור שכן"], correct: 0 }
        ];

        let qIndex = 0;
        let starCount = 0;

        function displayQuiz() {
            const q = quizData[qIndex];
            document.getElementById('quiz-question').innerText = q.q;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = "";
            q.options.forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'quiz-option';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === q.correct) {
                        alert("נכון מאוד! ⭐");
                        starCount++;
                        document.getElementById('stars').innerText = "⭐ ".repeat(starCount);
                        loadNextQuestion();
                    } else { alert("לא נכון, נסה שוב 🤔"); }
                };
                optionsDiv.appendChild(b);
            });
        }

        function loadNextQuestion() {
            qIndex = (qIndex + 1) % quizData.length;
            displayQuiz();
        }

        function sendToWhatsApp() {
            const name = document.getElementById('kidName').value;
            const msg = document.getElementById('msg').value;
            if(!name || !msg) return alert("מלאו שם והודעה!");
            
            const fullText = `השם שלי ${name} התשובה\\הדש שלי ${msg}`;
            window.open(`https://wa.me/972534314202?text=${encodeURIComponent(fullText)}`, '_blank');
        }

        function toggleParty() { document.getElementById('main-body').classList.toggle('party-active'); }

        loadVideo();
        displayQuiz();
    </script>
</body>
</html>
