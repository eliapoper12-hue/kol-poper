<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קול פופר | רדיו הילדים</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #ff9d00;
            --bg: #f0faff;
            --riddle-bg: #fff9c4;
            --quiz-bg: #e0f2f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        /* פס הכותרת הכתום */
        header {
            background-color: var(--secondary);
            width: 100%;
            padding: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* אנימציית מצב מסיבה */
        @keyframes party-bg {
            0% { background-color: #ffadad; }
            25% { background-color: #ffd6a5; }
            50% { background-color: #caffbf; }
            75% { background-color: #9bf6ff; }
            100% { background-color: #ffc6ff; }
        }
        .party-active { animation: party-bg 1s infinite linear !important; }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 4px solid var(--primary);
            position: relative;
        }

        /* עיצוב הלוגו */
        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* ריקוד הלוגו במצב מסיבה */
        @keyframes dance {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .party-active .logo-container img { animation: dance 0.5s infinite; }

        .player-card { background: #f8f9fa; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        
        .riddle-box {
            background-color: var(--riddle-bg);
            border: 3px dashed #fbc02d;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .quiz-box {
            background-color: var(--quiz-bg);
            border: 3px solid #009688;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .stars-display { font-size: 24px; color: #fbc02d; margin-bottom: 10px; min-height: 35px; }
        
        .quiz-option {
            background: white;
            border: 2px solid #009688;
            border-radius: 15px;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .quiz-option:hover { background: #b2dfdb; transform: scale(1.02); }
        
        #quiz-feedback { margin-top: 10px; font-weight: bold; font-size: 18px; }

        .controls { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .btn-ctrl { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        .whatsapp-box { background: #e6ffed; padding: 20px; border-radius: 25px; border: 2px dashed #25d366; margin-top: 15px; }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 16px; }
        .send-wa { background: #25d366; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 18px; }

        .party-toggle { background: linear-gradient(45deg, #f093fb, #f5576c); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body id="main-body">

    <header>
        <h1 style="margin:0; font-size:24px;">רדיו קול פופר 🎈</h1>
    </header>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="לוגו קול פופר">
        </div>

        <div class="player-card">
            <h3 id="song-name">טוען שיר...</h3>
            <audio id="audio-player" onended="nextSong()">
                <source id="audio-src" src="track1.mp3" type="audio/mpeg">
            </audio>
            <div class="controls">
                <button class="btn-ctrl" onclick="prevSong()">⏮</button>
                <button class="btn-ctrl" onclick="togglePlay()" id="play-btn" style="width:60px; height:60px; font-size:24px;">▶</button>
                <button class="btn-ctrl" onclick="nextSong()">⏭</button>
            </div>
        </div>

        <div class="riddle-box">
            <h2 style="color: #f57f17; margin:0;">🧩 החידה היומית</h2>
            <p style="font-size: 18px; font-weight: bold; margin: 10px 0;">איזה חג מתקרב אלינו?</p>
            <p style="font-size: 13px; color: #795548;">את התשובות לכתוב בד"ש לשידור בצירוף שם פרטי ושם משפחה</p>
        </div>

        <div class="quiz-box">
            <div id="stars" class="stars-display"></div>
            <h2 style="color: #00796b; margin-top: 0; font-size: 20px;">🎧 חידון הטריוויה</h2>
            <p id="quiz-question" style="font-weight: bold; font-size: 17px;"></p>
            <div id="quiz-options"></div>
            <div id="quiz-feedback"></div>
            <button onclick="loadNextQuestion()" style="background:none; border:none; color:#00796b; cursor:pointer; text-decoration:underline; margin-top:10px;">לשאלה הבאה ➔</button>
        </div>

        <div class="whatsapp-box">
            <h3>שלחו ד"ש ותשובה! 👋</h3>
            <input type="text" id="kidName" placeholder="שם פרטי ושם משפחה">
            <textarea id="msg" placeholder="כתבו כאן את התשובה לחידה או ד"ש..."></textarea>
            <button class="send-wa" onclick="sendToWhatsApp()">שלח הודעה לשדרן 📱</button>
        </div>

        <button class="party-toggle" onclick="toggleParty()">⚡ מצב מסיבה! ⚡</button>
    </div>

    <script>
        // --- שירים (track) ---
        const songs = [
            { name: "ברוך שם - שמוליק קליין", file: "track1.mp3" },
            { name: "אשרינו - סנדי דינקל", file: "track2.mp3" },
            { name: "מי שאתה - סנדי דינקל", file: "track3.mp3" }
        ];
        let index = 0;
        const player = document.getElementById('audio-player');
        
        function loadSong() {
            document.getElementById('song-name').innerText = songs[index].name;
            document.getElementById('audio-src').src = songs[index].file;
            player.load();
        }

        function togglePlay() { 
            if (player.paused) { 
                player.play(); 
                document.getElementById('play-btn').innerText = '⏸'; 
            } else { 
                player.pause(); 
                document.getElementById('play-btn').innerText = '▶'; 
            } 
        }

        function nextSong() { 
            index = (index + 1) % songs.length; 
            loadSong(); 
            player.play(); 
            document.getElementById('play-btn').innerText = '⏸';
        }

        function prevSong() { 
            index = (index - 1 + songs.length) % songs.length; 
            loadSong(); 
            player.play(); 
            document.getElementById('play-btn').innerText = '⏸';
        }

        // --- חידון ---
        const quizData = [
            { q: "איזה כלי נגינה הכי נפוץ ברדיו?", options: ["פסנתר 🎹", "גיטרה 🎸", "חצוצרה 🎺"], correct: 1 },
            { q: "מי שר את 'אשרינו'?", options: ["סנדי דינקל", "שמוליק קליין", "אברהם פריד"], correct: 0 },
            { q: "מה אוכלים בפסח?", options: ["מצה", "תפוח בדבש", "אוזן המן"], correct: 0 },
            { q: "קול פופר משעמם?", options: ["ברור שלא! הערוץ הכי מטורף בעולם", "כן", "ברור שכן"], correct: 0 },
        ];

        let qIndex = 0;
        let starCount = 0;

        function displayQuiz() {
            const q = quizData[qIndex];
            document.getElementById('quiz-question').innerText = q.q;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = "";
            document.getElementById('quiz-feedback').innerText = "";

            q.options.forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'quiz-option';
                b.innerText = opt;
                b.onclick = () => {
                    const fb = document.getElementById('quiz-feedback');
                    if(i === q.correct) {
                        fb.innerText = "נכון מאוד! קיבלת כוכב! ⭐";
                        fb.style.color = "green";
                        addStar();
                    } else {
                        fb.innerText = "לא נכון, נסה שוב 🤔";
                        fb.style.color = "red";
                    }
                };
                optionsDiv.appendChild(b);
            });
        }

        function addStar() {
            starCount++;
            let starsStr = "";
            for(let i=0; i<starCount; i++) { starsStr += "⭐ "; }
            document.getElementById('stars').innerText = starsStr;
        }

        function loadNextQuestion() {
            qIndex = (qIndex + 1) % quizData.length;
            displayQuiz();
        }

        function sendToWhatsApp() {
            const name = document.getElementById('kidName').value;
            const msg = document.getElementById('msg').value;
            if(!name || !msg) return alert("מלאו שם והודעה!");
            // אל תשכח לשנות את המספר למטה למספר האמיתי שלך
            window.open(`https://wa.me/972500000000?text=${encodeURIComponent('היי קול פופר! אני '+name+': '+msg)}`, '_blank');
        }

        function toggleParty() { 
            document.getElementById('main-body').classList.toggle('party-active'); 
        }

        loadSong();
        displayQuiz();
    </script>
</body>
</html>
